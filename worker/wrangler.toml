# Local deploy from worker/ (cd worker && npm run deploy).
# Dashboard one-click, GitHub Actions, and root npm run deploy use ../wrangler.toml instead.

name = "cf-quota-dashboard"
main = "src/index.ts"
compatibility_date = "2026-01-15"

# KV binding — variable name MUST be "KV" (uppercase). Do not rename.
# Namespace display name (Dashboard title) is typically "CF-Quota-Dashboard"; binding vs title differ.
# Repo uses placeholder id; replace locally or let GitHub Actions patch it from KV_NAMESPACE_ID.
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[assets]
directory = "../frontend"
binding = "ASSETS"

# Cron fallback refresh when dashboard is not visited (every 6 hours)
[triggers]
crons = ["0 */6 * * *"]

[vars]
WEBHOOK_URL = ""
ALERT_THRESHOLD = "70"
# Admin auth: set PASSWORD via `wrangler secret put PASSWORD` (not in [vars])
USERNAME = "admin"
# Refresh budget (respects Workers 50 subrequest limit per invocation)
ACCOUNT_CHECK_INTERVAL_MINUTES = "20"
MAX_EXTERNAL_SUBREQUESTS_PER_RUN = "50"
# Optional public snapshot API token (defaults to HMAC of PASSWORD+USERNAME)
# PUBLIC_API_TOKEN — use: wrangler secret put PUBLIC_API_TOKEN
# Optional AES-256 KV field encryption key (64-char hex); falls back to PBKDF2(PASSWORD)
# ENCRYPTION_KEY — use: wrangler secret put ENCRYPTION_KEY
