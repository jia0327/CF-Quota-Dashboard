<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CF 配额仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="page-shell dashboard-page">
  <div class="dashboard-topbar">
    <div class="dashboard-topbar__spacer"></div>
    <div class="dashboard-topbar__actions">
      <a href="https://github.com/jia0327/CF-Quota-Dashboard#readme" class="topbar-link" target="_blank" rel="noopener noreferrer" title="项目文档"><i class="fas fa-book" aria-hidden="true"></i><span>文档</span></a>
      <a href="https://github.com/jia0327/CF-Quota-Dashboard" class="topbar-link" target="_blank" rel="noopener noreferrer" title="GitHub 仓库"><i class="fab fa-github" aria-hidden="true"></i><span>GitHub</span></a>
      <button id="refresh-btn" class="icon-btn" type="button" title="手动刷新">↻</button>
      <a href="/admin" class="icon-btn" title="账号管理">⚙</a>
      <span id="nav-auth" class="nav-auth"></span>
    </div>
  </div>

  <main class="dashboard-main">
    <header class="dashboard-header">
      <h1 class="dashboard-title">Cloudflare 额度统计</h1>
      <div id="dashboard-status"></div>
      <div id="dashboard-header-hint"></div>
    </header>

    <p class="dashboard-meta">
      最后更新：<span id="last-updated" class="meta-value">—</span>
      <span id="refresh-stats"></span>
      <span id="auto-refresh-hint" class="dashboard-meta__hint"></span>
    </p>

    <div id="accounts-grid" class="accounts-grid">
      <div class="loading-state">加载中…</div>
    </div>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
