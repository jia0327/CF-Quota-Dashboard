<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号管理 — CF 配额仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="page-shell">
  <header class="glass-nav">
    <div class="glass-nav__inner glass-nav__inner--wide">
      <div class="glass-nav__brand">
        <h1>账号管理</h1>
        <p>添加、编辑与管理监控账号</p>
      </div>
      <nav class="glass-nav__links">
        <a href="/" class="nav-link">仪表盘</a>
        <a href="/admin" class="nav-link nav-link--active">账号管理</a>
        <a href="/admin/settings" class="nav-link">系统设置</a>
        <a href="/channels" class="nav-link">通知渠道</a>
        <a href="https://github.com/cf-fork-div/CF-Quota-Dashboard" class="github-stars-link" target="_blank" rel="noopener noreferrer" title="GitHub 仓库">
          <img src="https://img.shields.io/github/stars/cf-fork-div/CF-Quota-Dashboard?style=flat&logo=github" alt="GitHub Stars" height="20" />
        </a>
        <span id="nav-auth" class="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--wide space-y-8">
    <section>
      <div class="admin-section-header">
        <h2 class="section-title admin-section-header__title">已配置账号</h2>
        <button type="button" id="show-add-form-btn" class="btn-add-account" aria-haspopup="dialog" aria-controls="account-modal-overlay">
          <span class="btn-add-account__icon" aria-hidden="true">+</span>
          添加账号
        </button>
      </div>
      <p class="form-hint mb-3">拖动名称旁手柄可调整在仪表盘中的显示顺序。</p>
      <div id="accounts-list" class="loading-state">加载中…</div>
    </section>
  </main>

  <div id="account-modal-overlay" class="account-modal-overlay hidden" aria-hidden="true">
    <div class="account-modal" role="dialog" aria-modal="true" aria-labelledby="modal-form-title">
      <header class="account-modal__header">
        <div class="account-modal__header-main">
          <span class="account-modal__header-icon" aria-hidden="true">
            <i class="fas fa-user-circle"></i>
          </span>
          <div class="account-modal__header-text">
            <h2 id="modal-form-title" class="account-modal__title">添加账号</h2>
            <p class="account-modal__subtitle">凭据与告警配置</p>
          </div>
        </div>
        <button type="button" id="modal-close-btn" class="account-modal__close" aria-label="关闭">
          <i class="fas fa-xmark" aria-hidden="true"></i>
        </button>
      </header>

      <form id="account-form" class="account-modal__form">
        <div class="account-modal__body">
          <section class="account-modal__section">
            <h3 class="account-modal__section-title account-modal__section-title--basic">
              <span class="account-modal__section-icon" aria-hidden="true"><i class="fas fa-pen-to-square"></i></span>
              基础信息
            </h3>
            <div class="account-modal__fields">
              <div class="form-group">
                <label class="form-label">Account Name</label>
                <input name="name" required class="glass-input" placeholder="主账号" />
              </div>
              <div class="form-group">
                <label class="form-label">Account ID</label>
                <input name="accountId" required class="glass-input glass-input--mono" placeholder="32 位 Cloudflare Account ID" />
              </div>
              <div class="form-group">
                <label class="form-label">API Token (read-only)</label>
                <div class="account-modal__token-row">
                  <input name="apiToken" type="password" required class="glass-input glass-input--mono" placeholder="Cloudflare API Token" />
                  <button type="button" id="verify-btn" class="btn btn-secondary btn-sm account-modal__verify-btn">验证凭据</button>
                </div>
              </div>
            </div>
          </section>

          <section class="account-modal__section">
            <div class="account-modal__section-head">
              <h3 class="account-modal__section-title account-modal__section-title--alert">
                <span class="account-modal__section-icon" aria-hidden="true"><i class="fas fa-gear"></i></span>
                告警设置
              </h3>
              <div class="alert-rules-toolbar">
                <button type="button" id="alert-select-all" class="btn btn-ghost btn-sm">全选</button>
                <button type="button" id="alert-select-none" class="btn btn-ghost btn-sm">全不选</button>
              </div>
            </div>
            <p class="form-hint account-modal__alert-hint">
              按服务启用用量百分比告警；达到阈值后推送到所选通知渠道。
            </p>
            <div id="alert-no-channels" class="alert-no-channels hidden">
              <p class="alert-no-channels__message">
                通知渠道未配置，请先在<a href="/channels">通知渠道页面</a>添加
              </p>
            </div>
            <div id="alert-channel-field" class="form-group alert-channel-field">
              <label class="form-label" for="notification-channel-select">通知渠道</label>
              <select name="notificationChannelId" id="notification-channel-select" class="glass-input" required>
                <option value="">请选择通知渠道</option>
              </select>
            </div>
            <div id="alert-rules-section" class="alert-rules-section">
            <div id="alert-rules-grid" class="alert-rules-grid alert-rules-grid--modal">
              <p class="form-hint">加载服务列表…</p>
            </div>
            </div>
          </section>

          <p id="form-message" class="form-message account-modal__message"></p>
        </div>

        <footer class="account-modal__footer">
          <button type="submit" id="submit-btn" class="btn-save-config">
            <i class="fas fa-floppy-disk" aria-hidden="true"></i>
            保存配置
          </button>
        </footer>
      </form>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
