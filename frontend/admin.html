<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号管理 — CF 配额仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="page-shell">
  <header class="glass-nav">
    <div class="glass-nav__inner glass-nav__inner--wide">
      <div class="glass-nav__brand">
        <h1>账号管理</h1>
        <p>添加、编辑与管理监控账号</p>
      </div>
      <nav class="glass-nav__links">
        <a href="/" class="nav-link">仪表盘</a>
        <a href="/admin" class="nav-link nav-link--active">账号管理</a>
        <a href="/admin/settings" class="nav-link">系统设置</a>
        <a href="/channels" class="nav-link">通知渠道</a>
        <span id="nav-auth" class="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--wide space-y-8">
    <section>
      <div class="admin-section-header">
        <h2 class="section-title admin-section-header__title">已配置账号</h2>
        <button type="button" id="show-add-form-btn" class="btn-add-account" aria-expanded="false" aria-controls="account-form-panel">
          <span class="btn-add-account__icon" aria-hidden="true">+</span>
          添加账号
        </button>
      </div>
      <p class="form-hint mb-3">拖动左侧手柄可调整在仪表盘中的显示顺序。</p>
      <div id="accounts-list" class="loading-state">加载中…</div>
    </section>

    <section id="account-form-panel" class="glass-card account-form-panel hidden" aria-hidden="true">
      <h2 id="form-title" class="glass-card__title">添加账号</h2>
      <form id="account-form">
        <div class="form-group">
          <label class="form-label">Account Name</label>
          <input name="name" required class="glass-input" placeholder="主账号" />
        </div>
        <div class="form-group">
          <label class="form-label">Account ID</label>
          <input name="accountId" required class="glass-input glass-input--mono" placeholder="32 位 Cloudflare Account ID" />
        </div>
        <div class="form-group">
          <label class="form-label">API Token (read-only)</label>
          <input name="apiToken" type="password" required class="glass-input glass-input--mono" placeholder="Cloudflare API Token" />
          <p class="form-hint">保存前建议先点击「验证凭据」，确认 Token 有效且权限足够。</p>
        </div>

        <fieldset class="alert-settings">
          <legend class="form-label">告警设置</legend>
          <div class="alert-rules-header">
            <p class="form-hint alert-rules-hint">
              按服务启用用量百分比告警；达到阈值后通过已启用的通知渠道推送。默认不启用，需手动勾选。
            </p>
            <div class="alert-rules-toolbar">
              <button type="button" id="alert-select-all" class="btn btn-ghost btn-sm">全选</button>
              <button type="button" id="alert-select-none" class="btn btn-ghost btn-sm">全不选</button>
            </div>
          </div>
          <div id="alert-rules-grid" class="alert-rules-grid">
            <p class="form-hint">加载服务列表…</p>
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="button" id="verify-btn" class="btn btn-secondary">验证凭据</button>
          <button type="submit" id="submit-btn" class="btn btn-primary">保存账号</button>
          <button type="button" id="cancel-form-btn" class="btn btn-ghost">取消</button>
        </div>
        <p id="form-message" class="form-message"></p>
      </form>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
