<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通知渠道 — CF Quota Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="page-shell">
  <header class="glass-nav">
    <div class="glass-nav__inner glass-nav__inner--wide">
      <div class="glass-nav__brand">
        <h1>CF 配额仪表盘</h1>
        <p>多账号 Cloudflare 额度监控</p>
      </div>
      <nav class="glass-nav__links">
        <a href="/" class="nav-link">仪表盘</a>
        <a href="/admin" class="nav-link">账号管理</a>
        <a href="/admin/settings" class="nav-link">系统设置</a>
        <a href="/channels" class="nav-link nav-link--active">通知渠道</a>
        <a href="https://github.com/cf-fork-div/CF-Quota-Dashboard" class="icon-btn" target="_blank" rel="noopener noreferrer" title="GitHub 仓库" aria-label="GitHub 仓库"><i class="fab fa-github" aria-hidden="true"></i></a>
        <span id="nav-auth" class="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--wide">
    <div class="channels-shell glass-card">
      <header class="channels-modal-header">
        <div class="channels-modal-header__main">
          <div class="channels-modal-header__icon" aria-hidden="true">
            <i class="fas fa-bell"></i>
          </div>
          <div class="channels-modal-header__text">
            <h1 class="channels-modal-header__title">通知渠道管理</h1>
            <p class="channels-modal-header__subtitle">配置配额告警、恢复与检测失败的推送目标</p>
          </div>
        </div>
        <div class="channels-modal-header__actions">
          <div class="channels-modal-header__badge">
            <span class="channels-modal-header__badge-label">启用</span>
            <span id="enabled-count" class="channels-modal-header__badge-count">0</span>
            <span class="channels-modal-header__badge-sep">/</span>
            <span id="total-count" class="channels-modal-header__badge-total">0</span>
          </div>
          <button type="button" id="test-all-alerts-btn" class="btn btn-secondary btn-sm channels-modal-header__test-all">
            <i class="fas fa-paper-plane" aria-hidden="true"></i>
            发送测试告警
          </button>
          <button type="button" id="add-channel-btn" class="btn channels-btn-add">
            <i class="fas fa-plus" aria-hidden="true"></i>
            添加渠道
          </button>
        </div>
      </header>

      <p id="test-all-message" class="form-message channels-test-message hidden"></p>
      <div id="test-all-results" class="alert-test-results hidden"></div>

      <div class="channels-modal-body">
        <div class="channels-layout-uptime">
          <aside class="channels-editor" id="channels-editor">
            <div id="channels-picker-panel" class="channels-picker-panel">
              <div class="channels-picker-panel__icon" aria-hidden="true">
                <i class="fas fa-route"></i>
              </div>
              <h2 class="channels-picker-panel__title">选择或添加渠道</h2>
              <p class="channels-picker-panel__hint">从右侧选择已有渠道，或直接选择一种类型开始添加。</p>
              <div class="type-grid type-grid--uptime" id="type-buttons"></div>
            </div>

            <div id="channels-form-panel" class="channels-form-panel hidden">
              <div class="channels-form-panel__header">
                <div class="channels-form-panel__header-main">
                  <span id="form-type-icon" class="channel-icon channel-icon--md" aria-hidden="true"></span>
                  <div>
                    <h2 id="form-title" class="channels-form-panel__title">添加渠道</h2>
                    <p id="form-subtitle" class="channels-form-panel__subtitle"></p>
                  </div>
                </div>
                <button type="button" id="close-form-btn" class="channels-form-panel__close" aria-label="收起表单" title="收起表单">
                  <i class="fas fa-times" aria-hidden="true"></i>
                </button>
              </div>

              <form id="channel-form" class="channels-form-panel__body">
                <input type="hidden" name="id" />
                <input type="hidden" name="type" />

                <div id="form-type-picker" class="channels-form-type-picker hidden">
                  <label class="form-label form-label--sm">渠道类型</label>
                  <div class="type-grid type-grid--uptime" id="form-type-buttons"></div>
                </div>

                <div class="form-group">
                  <label class="form-label form-label--sm">渠道名称 <span class="form-label__required">*</span></label>
                  <input name="name" required class="glass-input" placeholder="例如：研发群机器人" />
                </div>

                <div id="config-fields" class="space-y-3"></div>

                <label class="form-checkbox">
                  <input type="checkbox" name="enabled" id="enabled-check" checked />
                  <span>启用</span>
                </label>
                <p id="form-message" class="form-message"></p>
              </form>

              <div class="channels-form-panel__footer">
                <button type="button" id="cancel-form" class="btn btn-ghost">取消</button>
                <button type="submit" form="channel-form" id="save-channel-btn" class="btn channels-btn-save">
                  <i class="fas fa-save" aria-hidden="true"></i>
                  <span id="save-channel-label">添加渠道</span>
                </button>
              </div>
            </div>
          </aside>

          <section class="channels-list-panel">
            <div class="channels-list-panel__head">
              <div>
                <h2 class="channels-list-panel__title">渠道列表</h2>
                <p class="channels-list-panel__hint">点击渠道卡片可编辑配置。</p>
              </div>
              <button type="button" id="refresh-channels-btn" class="channels-btn-refresh" aria-label="刷新渠道列表">
                <i class="fas fa-sync-alt" aria-hidden="true"></i>
                刷新
              </button>
            </div>

            <div id="channel-error" class="channels-error-banner hidden">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <p id="channel-error-text" class="channels-error-banner__text"></p>
              <button type="button" id="retry-channels-btn" class="channels-error-banner__retry">重试</button>
            </div>

            <div id="channels-list" class="channels-list loading-state">
              <div class="channels-skeleton">
                <div class="channels-skeleton__item"></div>
                <div class="channels-skeleton__item"></div>
                <div class="channels-skeleton__item"></div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/channels.js"></script>
</body>
</html>
