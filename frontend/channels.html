<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通知渠道 — CF Quota Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="page-shell">
  <header class="glass-nav">
    <div class="glass-nav__inner glass-nav__inner--wide">
      <div class="glass-nav__brand">
        <h1>CF 配额仪表盘</h1>
        <p>多账号 Cloudflare 额度监控</p>
      </div>
      <nav class="glass-nav__links">
        <a href="/" class="nav-link">仪表盘</a>
        <a href="/admin" class="nav-link">账号管理</a>
        <a href="/admin/settings" class="nav-link">系统设置</a>
        <a href="/channels" class="nav-link nav-link--active">通知渠道</a>
        <span id="nav-auth" class="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--wide">
    <header class="channels-page-header">
      <div class="channels-page-header__main">
        <h1 class="channels-page-header__title">
          <span class="channels-page-header__icon" aria-hidden="true"><i class="fas fa-bell"></i></span>
          通知渠道管理
        </h1>
        <p class="channels-page-header__subtitle">配置配额告警推送目标</p>
        <span class="channels-page-header__badge">
          启用 <span id="enabled-count">0</span> / <span id="total-count">0</span>
        </span>
      </div>
      <div class="channels-page-header__actions">
        <button type="button" id="test-all-alerts-btn" class="btn btn-secondary btn-sm channels-page-header__test-all">
          <i class="fas fa-paper-plane" aria-hidden="true"></i>
          发送测试告警
        </button>
        <button type="button" id="add-channel-btn" class="btn-add-account">
          <span class="btn-add-account__icon" aria-hidden="true">+</span>
          添加渠道
        </button>
      </div>
    </header>

    <p id="test-all-message" class="form-message channels-page-header__message"></p>
    <div id="test-all-results" class="alert-test-results hidden"></div>

    <div class="channels-layout">
      <section id="channels-add-panel" class="channels-panel glass-card">
        <h2 class="channels-panel__title">选择或添加渠道</h2>
        <p class="channels-panel__hint">从右侧选择已有渠道，或直接选择一种类型开始添加</p>
        <div class="type-grid" id="type-buttons"></div>

        <section id="channel-form-section" class="channels-form hidden">
          <h3 id="form-title" class="channels-form__title">新建渠道</h3>
          <form id="channel-form" class="space-y-3">
            <input type="hidden" name="id" />
            <input type="hidden" name="type" />
            <div class="form-group">
              <label class="form-label form-label--sm">名称</label>
              <input name="name" required class="glass-input" placeholder="主告警群" />
            </div>
            <div id="config-fields" class="space-y-3"></div>
            <label class="form-checkbox">
              <input type="checkbox" name="enabled" id="enabled-check" checked />
              <span>启用</span>
            </label>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存</button>
              <button type="button" id="cancel-form" class="btn btn-ghost">取消</button>
            </div>
            <p id="form-message" class="form-message"></p>
          </form>
        </section>
      </section>

      <section class="channels-panel glass-card channels-main">
        <div class="channels-panel__head">
          <h2 class="channels-panel__title">渠道列表</h2>
          <button type="button" id="refresh-channels-btn" class="icon-btn icon-btn--sm" aria-label="刷新渠道列表" title="刷新">
            <i class="fas fa-arrows-rotate" aria-hidden="true"></i>
          </button>
        </div>
        <p class="channels-panel__hint">点击渠道卡片可编辑配置</p>
        <div id="channels-list" class="channels-list loading-state">加载中…</div>
      </section>
    </div>
  </main>

  <script type="module" src="/channels.js"></script>
</body>
</html>
