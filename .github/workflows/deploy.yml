name: Deploy CF Quota Dashboard

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci || npm install

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Resolve KV namespace
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: |
          if [ -n "$KV_NAMESPACE_ID" ]; then
            ID="$KV_NAMESPACE_ID"
          else
            ID=$(npx wrangler kv namespace list --json | node -e "
              const list = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const ns = list.find((n) => n.title === 'KV');
              process.stdout.write(ns?.id ?? '');
            ")
            if [ -z "$ID" ]; then
              ID=$(npx wrangler kv namespace create KV --json | node -e "
                process.stdout.write(JSON.parse(require('fs').readFileSync(0, 'utf8')).id);
              ")
              echo "Created KV namespace: $ID"
            fi
          fi
          sed -i "s/YOUR_KV_NAMESPACE_ID/$ID/" wrangler.toml
          echo "Using KV namespace: $ID"

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
